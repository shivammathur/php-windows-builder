name: build-php-extension
description: Build PHP Extension
author: php

branding:
  icon: package
  color: purple

inputs:
  extension-url:
    description: URL to the extension source code
    required: false
  extension-ref:
    description: Git reference in the extension repo
    required: false
  auth-token:
    description: Auth token to fetch the extension source code
    required: false
  php-version:
    description: PHP version to build
    required: true
  php-build-artifact-repository:
    description: GitHub repository containing PHP build artifacts
    required: false
  php-build-artifact-run-id:
    description: GitHub Actions run ID containing PHP build artifacts
    required: false
  php-build-artifact-name:
    description: GitHub Actions artifact name containing PHP build zips
    required: false
    default: artifacts
  php-build-artifact-path:
    description: Local path containing PHP build artifact zips
    required: false
  php-build-artifact-token:
    description: GitHub token used to download PHP build artifacts
    required: false
  php-libs-artifact-repository:
    description: GitHub repository containing PHP dependency artifacts
    required: false
  php-libs-artifact-run-id:
    description: GitHub Actions run ID containing PHP dependency artifacts
    required: false
  php-libs-artifact-name:
    description: GitHub Actions artifact name containing PHP dependency zips
    required: false
  php-libs-artifact-path:
    description: Local path containing PHP dependency artifact zips or extracted dependency artifacts
    required: false
  php-libs-artifact-token:
    description: GitHub token used to download PHP dependency artifacts
    required: false
  php-libs-stability:
    description: PHP dependency series stability
    required: false
    default: stable
  apply-patches:
    description: Apply bundled php-windows-builder extension patches
    required: false
    default: 'false'
  arch:
    description: Architecture to build
    required: true
  ts:
    description: Thread safety to build
    required: true
  args:
    description: Additional arguments to pass to the build script
    required: false
  libs:
    description: Libraries required to build the extension
    required: false
  run-tests:
    description: Run tests after building the extension
    required: false
    default: 'true'
  test-runner:
    description: Test runner to use
    required: false
    default: 'run-tests.php'
  test-runner-args:
    description: Test runner to use
    required: false
  test-opcache-mode:
    description: Test opcache mode
    required: false
    default: 'off'
  test-workers:
    description: Test workers
    required: false
    default: '8'
  save-vs-cache:
    description: Save Visual Studio components cache
    required: false
    default: 'true'
  build-directory:
    description: Directory to build the extension in
    required: false
    default: 'build'

runs:
  using: composite
  steps:
    - name: Import module
      shell: pwsh
      run: |
        Add-Content -Path $env:GITHUB_ENV -Value "PSModulePath=${{ github.action_path }};$env:PSModulePath" -Encoding utf8

    - name: Check checkout state
      id: checkout-state
      shell: pwsh
      run: |
        Get-CheckoutState -Repository $env:GITHUB_REPOSITORY

    - name: Checkout
      if: ${{ steps.checkout-state.outputs.checkout_state == 'false' }}
      uses: actions/checkout@v6

    - name: Check VS components
      id: vs-check
      shell: pwsh
      run: |
        Get-VsCacheInfo -PhpVersion ${{ inputs.php-version }}

    - name: Restore VS components cache
      id: vs-cache
      if: steps.vs-check.outputs.needs-vs-install == 'true'
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.vs-check.outputs.vs-cache-path }}
        key: ${{ steps.vs-check.outputs.vs-cache-key-prefix }}

    - name: Restore VS toolset
      if: steps.vs-cache.outputs.cache-hit == 'true'
      shell: pwsh
      run: |
        Invoke-RestoreVsToolsetCache -CachePath "${{ steps.vs-check.outputs.vs-cache-path }}" -VsInstallPath "${{ steps.vs-check.outputs.vs-install-path }}"

    - name: Download PHP build artifact
      id: php-build-artifact
      if: ${{ inputs.php-build-artifact-run-id != '' }}
      shell: pwsh
      env:
        PHP_BUILD_ARTIFACT_REPOSITORY: ${{ inputs.php-build-artifact-repository }}
        PHP_BUILD_ARTIFACT_RUN_ID: ${{ inputs.php-build-artifact-run-id }}
        PHP_BUILD_ARTIFACT_NAME: ${{ inputs.php-build-artifact-name }}
        PHP_BUILD_ARTIFACT_TOKEN: ${{ inputs.php-build-artifact-token || github.token }}
      run: |
        $ErrorActionPreference = 'Stop'
        $repo = $env:PHP_BUILD_ARTIFACT_REPOSITORY
        if ([string]::IsNullOrWhiteSpace($repo)) {
          $repo = $env:GITHUB_REPOSITORY
        }
        $artifactPath = Join-Path $env:RUNNER_TEMP "php-build-artifacts-$($env:PHP_BUILD_ARTIFACT_RUN_ID)"
        Remove-Item -Path $artifactPath -Recurse -Force -ErrorAction SilentlyContinue
        New-Item -Path $artifactPath -ItemType Directory -Force | Out-Null

        if (-not [string]::IsNullOrWhiteSpace($env:PHP_BUILD_ARTIFACT_TOKEN)) {
          $env:GH_TOKEN = $env:PHP_BUILD_ARTIFACT_TOKEN
        }
        gh run download $env:PHP_BUILD_ARTIFACT_RUN_ID --repo $repo --name $env:PHP_BUILD_ARTIFACT_NAME --dir $artifactPath
        if ($LASTEXITCODE -ne 0) {
          throw "Failed to download PHP build artifact $($env:PHP_BUILD_ARTIFACT_NAME) from $repo run $($env:PHP_BUILD_ARTIFACT_RUN_ID)"
        }
        "path=$artifactPath" | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

    - name: Download PHP dependency artifact
      id: php-libs-artifact
      if: ${{ inputs.php-libs-artifact-run-id != '' }}
      shell: pwsh
      env:
        PHP_LIBS_ARTIFACT_REPOSITORY: ${{ inputs.php-libs-artifact-repository }}
        PHP_LIBS_ARTIFACT_RUN_ID: ${{ inputs.php-libs-artifact-run-id }}
        PHP_LIBS_ARTIFACT_NAME: ${{ inputs.php-libs-artifact-name }}
        PHP_LIBS_ARTIFACT_TOKEN: ${{ inputs.php-libs-artifact-token || github.token }}
      run: |
        $ErrorActionPreference = 'Stop'
        $repo = $env:PHP_LIBS_ARTIFACT_REPOSITORY
        if ([string]::IsNullOrWhiteSpace($repo)) {
          $repo = $env:GITHUB_REPOSITORY
        }
        $artifactPath = Join-Path $env:RUNNER_TEMP "php-libs-artifacts-$($env:PHP_LIBS_ARTIFACT_RUN_ID)"
        Remove-Item -Path $artifactPath -Recurse -Force -ErrorAction SilentlyContinue
        New-Item -Path $artifactPath -ItemType Directory -Force | Out-Null

        if (-not [string]::IsNullOrWhiteSpace($env:PHP_LIBS_ARTIFACT_TOKEN)) {
          $env:GH_TOKEN = $env:PHP_LIBS_ARTIFACT_TOKEN
        }

        $downloadArgs = @('run', 'download', $env:PHP_LIBS_ARTIFACT_RUN_ID, '--repo', $repo, '--dir', $artifactPath)
        if (-not [string]::IsNullOrWhiteSpace($env:PHP_LIBS_ARTIFACT_NAME)) {
          $downloadArgs += @('--name', $env:PHP_LIBS_ARTIFACT_NAME)
        }
        gh @downloadArgs
        if ($LASTEXITCODE -ne 0) {
          $artifactName = if ([string]::IsNullOrWhiteSpace($env:PHP_LIBS_ARTIFACT_NAME)) { 'all dependency artifacts' } else { $env:PHP_LIBS_ARTIFACT_NAME }
          throw "Failed to download PHP dependency artifact $artifactName from $repo run $($env:PHP_LIBS_ARTIFACT_RUN_ID)"
        }
        "path=$artifactPath" | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

    - name: Build PHP Extension
      id: build
      shell: pwsh
      env:
        CONFIGURE_ARGS: ${{inputs.args}}
        LIBRARIES: ${{inputs.libs}}
        ARTIFACT_NAMING_SCHEME: ${{env.artifact-naming-scheme}}
        RUN_TESTS: ${{inputs.run-tests}}
        TEST_RUNNER: ${{inputs.test-runner}}
        TEST_RUNNER_ARGS: ${{inputs.test-runner-args}}
        TEST_OPCACHE_MODE: ${{inputs.test-opcache-mode}}
        TEST_WORKERS: ${{inputs.test-workers}}
        BUILD_DIRECTORY: ${{inputs.build-directory}}
        AUTH_TOKEN: ${{inputs.auth-token}}
        AUTO_DETECT_ARGS: ${{env.auto-detect-args}}
        AUTO_DETECT_LIBS: ${{env.auto-detect-libs}}
        APPLY_PATCHES: ${{inputs.apply-patches}}
        PHP_BUILD_ARTIFACT_PATH: ${{ steps.php-build-artifact.outputs.path || inputs.php-build-artifact-path }}
        PHP_LIBS_ARTIFACT_PATH: ${{ steps.php-libs-artifact.outputs.path || inputs.php-libs-artifact-path || env.PHP_LIBS_ARTIFACT_PATH }}
        PHP_LIBS_STABILITY: ${{ inputs.php-libs-stability }}
      run: |
        Invoke-PhpBuildExtension -ExtensionUrl "${{inputs.extension-url}}" `
                                 -ExtensionRef "${{inputs.extension-ref}}" `
                                 -PhpVersion ${{inputs.php-version}} `
                                 -Arch ${{inputs.arch}} `
                                 -Ts ${{inputs.ts}}

    - name: Stage VS toolset cache
      if: inputs.save-vs-cache == 'true' && steps.vs-check.outputs.needs-vs-install == 'true' && steps.vs-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Invoke-SaveVsToolsetCache -PhpVersion ${{ inputs.php-version }} -CachePath "${{ steps.vs-check.outputs.vs-cache-path }}"

    - name: Save VS components cache
      if: inputs.save-vs-cache == 'true' && steps.vs-check.outputs.needs-vs-install == 'true' && steps.vs-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: actions/cache/save@v5
      with:
        path: ${{ steps.vs-check.outputs.vs-cache-path }}
        key: ${{ steps.vs-cache.outputs.cache-primary-key }}

    - name: Upload the build artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.build.outputs.artifact }}
        path: artifacts/*
