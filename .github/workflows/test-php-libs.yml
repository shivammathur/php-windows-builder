name: Build PHP with custom library builds from winlibs/winlib-builder
run-name: Build PHP ${{ inputs.php-version }}
on:
  workflow_dispatch:
    inputs:
      php-version:
        description: 'PHP version to build'
        required: true
      libs-build-runs:
        description: 'Comma-separated list of GitHub Actions run IDs from winlibs/winlib-builder; required for ARM64 builds'
        required: false

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.set-matrix.outputs.build-matrix }}
      test-matrix: ${{ steps.set-matrix.outputs.test-matrix }}
      smoke-matrix: ${{ steps.set-matrix.outputs.smoke-matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate matrices
        id: set-matrix
        shell: pwsh
        run: |
          $supportsArm64 = -not [string]::IsNullOrWhiteSpace('${{ inputs.libs-build-runs }}')
          if (-not $supportsArm64) {
            Write-Host 'Skipping ARM64 matrix entries because no custom dependency workflow runs were provided.'
          }

          & ./.github/scripts/get-php-workflow-matrix.ps1 `
            -PhpVersion '${{ inputs.php-version }}' `
            -SupportsArm64Override:$supportsArm64

  php:
    needs: set-matrix
    strategy:
      matrix: ${{ fromJson(needs.set-matrix.outputs.build-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        uses: ./php
        with:
          php-version: ${{ inputs.php-version }}
          arch: ${{ matrix.arch }}
          ts: ${{ matrix.ts }}
          libs-build-runs: ${{ inputs.libs-build-runs }}
        env:
          PHP_BUILD_PROVIDER: "The PHP Group"

  artifacts:
    runs-on: ubuntu-latest
    needs: php
    outputs:
      artifact-id: ${{ steps.artifacts.outputs.artifact-id }}
    steps:
      - name: Upload artifacts
        uses: actions/upload-artifact/merge@v7
        id: artifacts
        with:
          name: artifacts
          delete-merged: true
  tests:
    needs: [set-matrix, artifacts]
    strategy:
      matrix: ${{ fromJson(needs.set-matrix.outputs.test-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        id: artifacts
        with:
          name: artifacts

      - name: Get Cache Key
        id: cache-key
        run: |
          Import-Module (Join-Path $(pwd).Path '\php\BuildPhp') -Force
          $cacheInfo = Get-DepsCacheInfo -PhpVersion '${{inputs.php-version}}' -Arch '${{ matrix.arch }}' -LibsBuildRuns '${{ inputs.libs-build-runs }}' -IncludeDefaultRunsKey
          Set-Content -Path packages.txt -Value ($cacheInfo.Packages -join "`n")
          Add-Content -Value "cache-key=$($cacheInfo.CacheKey)" -Path $env:GITHUB_OUTPUT
          Add-Content -Value "cache-dir=$($cacheInfo.CacheDir)" -Path $env:GITHUB_OUTPUT

      - name: Cache Deps
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: ${{ steps.cache-key.outputs.cache-dir }}
          key: ${{ steps.cache-key.outputs.cache-key }}-${{ hashFiles('packages.txt') }}

      - name: Test PHP
        shell: pwsh
        continue-on-error: true
        env:
          DEPS_DIR: ${{ steps.cache-key.outputs.cache-dir }}
          DEPS_CACHE_HIT: ${{ steps.cache-deps.outputs.cache-hit }}
          LIBS_BUILD_RUNS: ${{ inputs.libs-build-runs }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Import-Module (Join-Path $(pwd).Path '\php\BuildPhp') -Force          
          Invoke-PhpTests -PhpVersion ${{inputs.php-version}} `
                          -Arch ${{matrix.arch}} `
                          -Ts ${{matrix.ts}} `
                          -Opcache ${{matrix.opcache}} `
                          -TestType ${{matrix.test_type}}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: test-results-${{matrix.arch}}-${{matrix.ts}}-${{matrix.opcache}}-${{matrix.test_type}}
          path: test-${{matrix.arch}}-${{matrix.ts}}-${{matrix.opcache}}-${{matrix.test_type}}.xml

  smoke-tests:
    needs: [set-matrix, artifacts]
    strategy:
      matrix: ${{ fromJson(needs.set-matrix.outputs.smoke-matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: artifacts
          path: artifacts

      - name: Smoke test PHP builds
        shell: pwsh
        run: |
          Import-Module (Join-Path $(pwd).Path '\php\BuildPhp') -Force
          Invoke-PhpSmokeTests -ArtifactsDirectory (Join-Path $(pwd).Path 'artifacts') `
                               -Arch ${{matrix.arch}} `
                               -Ts ${{matrix.ts}}
