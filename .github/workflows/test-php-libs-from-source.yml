name: Build PHP with custom library builds from winlibs/winlib-builder (source)
run-name: PGO repro from source ${{ inputs.php-src-ref }}
on:
  workflow_dispatch:
    inputs:
      php-src-repository:
        description: 'php-src repository to source builds and tests from'
        required: true
      php-src-ref:
        description: 'Branch, tag, or SHA in the php-src repository to source builds and tests from'
        required: true
      libs-build-runs:
        description: 'Comma-separated list of GitHub Actions run IDs from winlibs/winlib-builder'
        required: false

jobs:
  pgo-repro:
    runs-on: windows-2022
    steps:
      - name: Configure PHP source line endings
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout PHP source
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.php-src-repository }}
          ref: ${{ inputs.php-src-ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: builder

      - name: Disable unrelated curl extension
        shell: pwsh
        run: |
          $config = 'builder\php\BuildPhp\config\vs17\x64\config.nts.bat'
          $content = Get-Content -Path $config -Raw
          $content = $content -replace '"--enable-com-dotnet=shared"', '"--enable-com-dotnet=shared" "--without-curl"'
          Set-Content -Path $config -Value $content -NoNewline

      - name: Build x64 NTS PGO
        uses: ./builder/php
        with:
          arch: x64
          ts: nts
          libs-build-runs: ${{ inputs.libs-build-runs }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          PHP_BUILD_PROVIDER: "The PHP Group"

      - name: Run inheritance error-handler repro
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $zip = Get-ChildItem -Path artifacts -Filter 'php-*-nts-Win32-vs17-x64.zip' -File |
            Sort-Object Name |
            Select-Object -First 1
          if ($null -eq $zip) {
            Get-ChildItem -Path artifacts -Filter '*.zip' | Sort-Object Name | Select-Object Name
            throw 'x64 NTS PHP artifact not found.'
          }

          New-Item phpbin -ItemType Directory -Force | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath phpbin -Force

          @'
          <?php
          set_error_handler(function($code, $message) {
              throw new Exception($message);
          });

          try {
              class C extends DateTime {
                  public function getTimezone() {}
                  public function getTimestamp() {}
              }
          } catch (Exception $e) {
              printf("%s: %s\n", $e::class, $e->getMessage());
          }

          var_dump(new C());
          '@ | Set-Content -Path repro.php -Encoding ascii

          & .\phpbin\php.exe -n .\repro.php
          $exitCode = $LASTEXITCODE
          Write-Host "Repro exit code: $exitCode"
          if ($exitCode -ne 0) {
            exit $exitCode
          }
