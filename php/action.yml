name: build-php
description: Build PHP
author: php

branding:
  icon: package
  color: purple

inputs:
  php-version:
    description: PHP version to build, skip this to build from the current source directory
    required: false
  arch:
    description: Architecture to build
    required: true
  ts:
    description: Thread safety to build
    required: true
  libs-build-runs:
    description: Comma-separated list of GitHub Actions run IDs from winlibs/winlib-builder to download artifacts from
    required: false
  php-sdk-repository:
    description: GitHub repository for the PHP SDK source archive
    required: false
    default: shivammathur/php-sdk-binary-tools
  php-sdk-ref:
    description: Git reference for the PHP SDK source archive
    required: false
    default: codex/pgo-case-revival
  pgo-cases:
    description: Comma-separated PGO training cases to run during initialization and training
    required: false
  pgo-default-cases:
    description: Comma-separated PGO training cases to run for the default scenario
    required: false
  pgo-cache-cases:
    description: Comma-separated PGO training cases to run for the cache scenario
    required: false
  github-token:
    description: GitHub token for accessing private repositories
    required: false
    default: ${{ github.token }}  

runs:
  using: composite
  steps:
    - name: Build PHP
      shell: pwsh
      env:
        LIBS_BUILD_RUNS: ${{ inputs.libs-build-runs }}
        PHP_SDK_REPOSITORY: ${{ inputs.php-sdk-repository }}
        PHP_SDK_REF: ${{ inputs.php-sdk-ref }}
        PHP_SDK_PGO_CASES: ${{ inputs.pgo-cases }}
        PHP_SDK_PGO_DEFAULT_CASES: ${{ inputs.pgo-default-cases }}
        PHP_SDK_PGO_CACHE_CASES: ${{ inputs.pgo-cache-cases }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        Import-Module ${{ github.action_path }}\BuildPhp -Force
        Invoke-PhpBuild -PhpVersion '${{ inputs.php-version }}' `
                        -Arch '${{ inputs.arch }}' `
                        -Ts '${{ inputs.ts }}'

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: artifacts-${{ inputs.php-version || 'source' }}-${{inputs.arch}}-${{inputs.ts}}
        path: artifacts/*
